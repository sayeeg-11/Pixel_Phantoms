<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL | Chromatic Decryptor</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050608;
            --neon-accent: #00ff88;
            --neon-dim: rgba(0, 255, 136, 0.3);
            --panel-bg: rgba(15, 18, 25, 0.95);
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body {
            background: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            color: #e0f7ff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 800px;
            position: relative;
        }

        .header-ui {
            background: var(--neon-accent);
            color: #000;
            padding: 5px 15px;
            font-size: 0.7rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0% 100%);
        }

        .sentinel-card {
            background: var(--panel-bg);
            border: 1px solid var(--neon-accent);
            border-top: none;
            padding: 2.5rem;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Scanning Laser Line */
        .sentinel-card::before {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--neon-accent);
            box-shadow: 0 0 15px var(--neon-accent);
            animation: scan 4s linear infinite;
            z-index: 5;
            opacity: 0.3;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        h2 {
            color: var(--neon-accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 30px 0;
            font-size: 1.4rem;
            text-shadow: 0 0 10px var(--neon-accent);
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .color-slot {
            height: 180px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px 10px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: deploy 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes deploy {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .color-slot:hover {
            transform: translateY(-5px);
            border-color: #fff;
            z-index: 10;
        }

        .slot-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lock-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 4px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .lock-btn.locked {
            background: var(--neon-accent);
            color: #000;
            border-color: var(--neon-accent);
        }

        .hex-value {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            backdrop-filter: blur(4px);
            cursor: copy;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            align-items: center;
        }

        .btn-gen {
            background: var(--neon-accent);
            color: #000;
            border: none;
            padding: 18px;
            font-weight: 700;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        .btn-gen:hover {
            box-shadow: 0 0 25px var(--neon-accent);
            transform: scale(1.02);
        }

        .hint {
            font-size: 0.65rem;
            color: #555;
            text-align: center;
            margin-top: 15px;
            text-transform: uppercase;
        }

        #status {
            color: var(--neon-accent);
            font-size: 0.7rem;
            text-align: right;
            min-height: 1em;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .palette-grid { grid-template-columns: 1fr 1fr; }
            .color-slot { height: 120px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-ui">
        <span>MODULE: NEURAL_COLOR_SENTINEL</span>
        <span id="sys-time">READY</span>
    </div>

    <div class="sentinel-card">
        <h2>> PALETTE_EXTRACTOR</h2>
        
        <div class="palette-grid" id="palette">
            </div>

        <div class="controls">
            <button class="btn-gen" onclick="generatePalette()">REGENERATE_SIGNAL [SPACE]</button>
            <div id="status">SYS_IDLE</div>
        </div>
        
        <div class="hint">Click color to lock 🔒 | Click hex to copy 📋</div>
    </div>
</div>

<script>
    let colorData = Array(5).fill(null).map(() => ({
        hex: '#00FF88',
        locked: false
    }));

    function getContrastYIQ(hexcolor){
        hexcolor = hexcolor.replace("#", "");
        var r = parseInt(hexcolor.substr(0,2),16);
        var g = parseInt(hexcolor.substr(2,2),16);
        var b = parseInt(hexcolor.substr(4,2),16);
        var yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? 'black' : 'white';
    }

    function generateHex() {
        const chars = '0123456789ABCDEF';
        let color = '#';
        for (let i = 0; i < 6; i++) {
            color += chars[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    function generatePalette() {
        const container = document.getElementById('palette');
        container.innerHTML = '';

        colorData.forEach((data, index) => {
            if (!data.locked) {
                data.hex = generateHex();
            }

            const contrast = getContrastYIQ(data.hex);
            
            const slot = document.createElement('div');
            slot.className = 'color-slot';
            slot.style.backgroundColor = data.hex;
            slot.style.color = contrast;
            slot.style.animationDelay = `${index * 0.05}s`;
            
            slot.innerHTML = `
                <div class="slot-actions">
                    <div class="lock-btn ${data.locked ? 'locked' : ''}" onclick="toggleLock(${index}, event)">
                        ${data.locked ? '🔒' : '🔓'}
                    </div>
                </div>
                <div class="hex-value" onclick="copyHex('${data.hex}', event)">
                    ${data.hex}
                </div>
            `;

            container.appendChild(slot);
        });
        
        showStatus("BUFFER_UPDATED");
    }

    function toggleLock(index, e) {
        e.stopPropagation();
        colorData[index].locked = !colorData[index].locked;
        generatePalette(); // Refresh UI
        showStatus(colorData[index].locked ? "SIG_LOCKED" : "SIG_RELEASED");
    }

    async function copyHex(hex, e) {
        e.stopPropagation();
        await navigator.clipboard.writeText(hex);
        showStatus(`COPIED_${hex}`);
    }

    function showStatus(msg) {
        const s = document.getElementById('status');
        s.textContent = `> ${msg}`;
        s.style.opacity = 1;
        setTimeout(() => s.textContent = 'SYS_READY', 2000);
    }

    // Keyboard Support
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            generatePalette();
        }
    });

    // Initialize
    generatePalette();
</script>

</body>
</html>
