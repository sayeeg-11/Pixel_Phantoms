<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Phantoms | Hex Color Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --neon-accent: #00ff88;
        }

        body {
            background: var(--bg-dark);
            color: #e0f7ff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .sentinel-card {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid var(--neon-accent);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        h2 {
            color: var(--neon-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            padding-bottom: 10px;
        }

        .palette-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .color-slot {
            height: 100px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .color-slot:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .hex-label {
            background: rgba(0, 0, 0, 0.7);
            font-size: 0.7rem;
            padding: 4px;
            border-radius: 2px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-gen {
            background: var(--neon-accent);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-gen:hover {
            box-shadow: 0 0 20px var(--neon-accent);
            letter-spacing: 1px;
        }

        .status {
            font-size: 0.7rem;
            color: var(--neon-accent);
            height: 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="sentinel-card">
    <h2>> HEX_COLOR_SENTINEL_v1.2</h2>
    
    <div class="palette-display" id="palette">
        </div>

    <div class="controls">
        <button class="btn-gen" onclick="generatePalette()">GENERATE_NEW_SCHEME</button>
        <div class="status" id="status"></div>
    </div>
</div>

<script>
    const palette = document.getElementById('palette');
    const status = document.getElementById('status');

    function generateColor() {
        // Generates bright/cyber hex codes
        const chars = '0123456789ABCDEF';
        let color = '#';
        for (let i = 0; i < 6; i++) {
            color += chars[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    function generatePalette() {
        palette.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const hex = generateColor();
            const slot = document.createElement('div');
            slot.className = 'color-slot';
            slot.style.backgroundColor = hex;
            slot.innerHTML = `<span class="hex-label">${hex}</span>`;
            
            slot.onclick = () => copyHex(hex);
            palette.appendChild(slot);
        }
        showStatus("PALETTE_REGENERATED_SUCCESSFULLY");
    }

    async function copyHex(hex) {
        await navigator.clipboard.writeText(hex);
        showStatus(`HEX_CODE_${hex}_COPIED`);
    }

    function showStatus(msg) {
        status.textContent = `> ${msg}`;
        setTimeout(() => status.textContent = '', 2500);
    }

    // Initialize
    generatePalette();
</script>
</body>
</html>
