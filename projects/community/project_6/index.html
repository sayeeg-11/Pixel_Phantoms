<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM_OS | Temporal Link</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-red: #ff0055;
            --bg-dark: #050608;
            --panel-bg: rgba(10, 12, 18, 0.95);
            --border-glow: rgba(0, 229, 255, 0.2);
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.05) 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 100%, 100% 4px, 3px 100%;
            color: #e0f7ff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .terminal-window {
            width: 95%;
            max-width: 650px;
            position: relative;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.1));
        }

        .terminal-header {
            background: var(--neon-cyan);
            color: #000;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            clip-path: polygon(0 0, 98% 0, 100% 100%, 0% 100%);
        }

        .converter-card {
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            border-top: none;
            padding: 2.5rem;
            backdrop-filter: blur(10px);
        }

        .glitch-title {
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 25px 0;
            font-size: 1.2rem;
            position: relative;
        }

        .current-epoch-module {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--border-glow);
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
        }

        .current-epoch-module::after {
            content: "LIVE_FEED";
            position: absolute;
            top: -10px;
            right: 15px;
            background: var(--bg-dark);
            padding: 0 10px;
            font-size: 0.6rem;
            color: var(--neon-cyan);
        }

        #liveEpoch {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        .input-block {
            margin-bottom: 25px;
        }

        label {
            font-size: 0.7rem;
            color: var(--neon-cyan);
            display: block;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-glow);
            color: #fff;
            padding: 14px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .btn-primary {
            background: var(--neon-cyan);
            color: #000;
            margin-top: 10px;
            width: 100%;
        }

        .result-display {
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid var(--neon-cyan);
            padding: 15px;
            margin-top: 12px;
            font-size: 0.9rem;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .relative-time {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
        }

        .error-text {
            color: var(--neon-red);
            border-color: var(--neon-red);
        }

        #status-bar {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #444;
            display: flex;
            justify-content: space-between;
        }

        /* Animations */
        @keyframes flicker {
            0% { opacity: 0.9; }
            5% { opacity: 1; }
            10% { opacity: 0.9; }
            100% { opacity: 1; }
        }
        .terminal-window { animation: flicker 5s infinite; }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <span>SESSION: TEMPORAL_DECRYPTOR</span>
        <span>OS_v2.0.4</span>
    </div>

    <div class="converter-card">
        <h2 class="glitch-title">> EPOCH_PROTOCOL</h2>
        
        <div class="current-epoch-module">
            <div id="liveEpoch">0000000000</div>
            <label style="margin-top: 10px; opacity: 0.5;">SECONDS SINCE 1970-01-01</label>
        </div>

        <div class="input-block">
            <label>TIMESTAMP_DECODE (SEC/MS)</label>
            <div class="input-row">
                <input type="number" id="tsInput" placeholder="1740845161">
                <button class="btn" onclick="setNow()">NOW</button>
            </div>
            <button class="btn btn-primary" onclick="toHuman()">DECODE_TIME</button>
            <div id="humanResult" class="result-display">Awaiting temporal data...</div>
        </div>

        <div style="height: 1px; background: var(--border-glow); margin: 30px 0;"></div>

        <div class="input-block">
            <label>ISO_8601_ENCODE</label>
            <input type="text" id="dateInput" placeholder="YYYY-MM-DD HH:MM:SS">
            <button class="btn btn-primary" onclick="toEpoch()">GENERATE_EPOCH</button>
            <div id="epochResult" class="result-display">Awaiting coordinate input...</div>
        </div>

        <div id="status-bar">
            <span>BITRATE: 128.4 KB/S</span>
            <span id="system-msg">SYSTEM_READY</span>
            <span>UTC_SYNC: ACTIVE</span>
        </div>
    </div>
</div>

<script>
    // Live Pulse
    setInterval(() => {
        document.getElementById('liveEpoch').textContent = Math.floor(Date.now() / 1000);
    }, 1000);

    function setNow() {
        document.getElementById('tsInput').value = Math.floor(Date.now() / 1000);
        toHuman();
    }

    function getRelativeTime(d) {
        const msPerMinute = 60 * 1000;
        const msPerHour = msPerMinute * 60;
        const msPerDay = msPerHour * 24;
        const elapsed = Date.now() - d.getTime();

        if (Math.abs(elapsed) < msPerMinute) return 'Just now';
        
        const prefix = elapsed > 0 ? '' : 'In ';
        const suffix = elapsed > 0 ? ' ago' : '';
        const absElapsed = Math.abs(elapsed);

        if (absElapsed < msPerHour) return prefix + Math.round(absElapsed/msPerMinute) + 'm' + suffix;
        if (absElapsed < msPerDay ) return prefix + Math.round(absElapsed/msPerHour) + 'h' + suffix;
        return prefix + Math.round(absElapsed/msPerDay) + ' days' + suffix;
    }

    function toHuman() {
        const input = document.getElementById('tsInput').value;
        const display = document.getElementById('humanResult');
        if (!input) return;

        // Auto-detect Milliseconds vs Seconds
        let ts = parseFloat(input);
        if (input.length > 11) ts = ts / 1000; 

        try {
            const date = new Date(ts * 1000);
            if (isNaN(date.getTime())) throw new Error();
            
            display.classList.remove('error-text');
            display.innerHTML = `
                <div><strong>UTC:</strong> ${date.toUTCString()}</div>
                <div><strong>LOC:</strong> ${date.toLocaleString()}</div>
                <div class="relative-time">${getRelativeTime(date)}</div>
            `;
            updateStatus("DECODE_SUCCESS");
        } catch (e) {
            display.classList.add('error-text');
            display.textContent = "SIGNAL_LOST: INVALID_TIMESTAMP";
        }
    }

    function toEpoch() {
        const input = document.getElementById('dateInput').value;
        const display = document.getElementById('epochResult');
        if (!input) return;

        try {
            const date = new Date(input);
            if (isNaN(date.getTime())) throw new Error();
            
            const epoch = Math.floor(date.getTime() / 1000);
            display.classList.remove('error-text');
            display.innerHTML = `
                <div style="font-size: 1.2rem; color: var(--neon-cyan); font-weight: bold;">${epoch}</div>
                <div class="relative-time">Click value to copy</div>
            `;
            display.style.cursor = "pointer";
            display.onclick = () => {
                navigator.clipboard.writeText(epoch);
                updateStatus("COPIED_TO_BUFFER");
            };
            updateStatus("ENCODE_SUCCESS");
        } catch (e) {
            display.classList.add('error-text');
            display.textContent = "SYNTAX_ERROR: USE YYYY-MM-DD";
        }
    }

    function updateStatus(msg) {
        const s = document.getElementById('system-msg');
        s.textContent = msg;
        s.style.color = "var(--neon-cyan)";
        setTimeout(() => {
            s.textContent = "SYSTEM_READY";
            s.style.color = "#444";
        }, 2000);
    }

    // Initialize date input
    document.getElementById('dateInput').value = new Date().toISOString().slice(0, 19).replace('T', ' ');
</script>
</body>
</html>
