<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Phantoms | Cyber Markdown Previewer</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --neon-green: #00ff88;
            --bg-dark: #0a0b10;
            --border-color: rgba(0, 255, 136, 0.3);
        }

        body {
            background: var(--bg-dark);
            color: #e0f7ff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: rgba(20, 20, 30, 0.9);
            border-bottom: 1px solid var(--neon-green);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 {
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-size: 1rem;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            overflow: hidden;
        }

        .pane {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .pane-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            font-size: 0.7rem;
            color: var(--neon-green);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        textarea {
            flex: 1;
            background: transparent;
            color: #fff;
            border: none;
            padding: 20px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }

        #preview {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            color: #e0f7ff;
        }

        /* Preview Content Styling */
        #preview h1, #preview h2, #preview h3 { color: var(--neon-green); }
        #preview code { background: rgba(0, 255, 136, 0.1); padding: 2px 4px; color: var(--neon-green); }
        #preview a { color: var(--neon-green); }
        #preview blockquote { border-left: 3px solid var(--neon-green); margin-left: 0; padding-left: 15px; color: #888; }

        .btn-action {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 15px;
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 10px var(--neon-green);
        }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .pane { border-right: none; border-bottom: 1px solid var(--border-color); }
        }
    </style>
</head>
<body>

<header>
    <h2>> MARKDOWN_PREVIEWER_v1.0</h2>
    <button class="btn-action" onclick="copyHtml()">COPY_HTML</button>
</header>

<main>
    <div class="pane">
        <div class="pane-header">Source_Input</div>
        <textarea id="editor" placeholder="Enter markdown here..."># System_Protocol
## Security_Check
- [x] Initializing Uplink
- [ ] Decoding Matrix

`console.log("Welcome to Pixel Phantoms");`</textarea>
    </div>
    <div class="pane">
        <div class="pane-header">Rendered_Output</div>
        <div id="preview"></div>
    </div>
</main>

<script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    function updatePreview() {
        const text = editor.value;
        preview.innerHTML = marked.parse(text);
    }

    async function copyHtml() {
        const html = preview.innerHTML;
        await navigator.clipboard.writeText(html);
        alert("UPLINK: HTML source copied to clipboard.");
    }

    editor.addEventListener('input', updatePreview);
    
    // Initial Render
    updatePreview();
</script>
</body>
</html>
